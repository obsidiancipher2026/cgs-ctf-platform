<body>
<nav><ul><li><a href="#" class="active">Challenge</a></li></ul></nav>
<div class="hero"><div class="hero-content"><h1>JWT Authentication Bypass</h1><p>Exploit a weak JWT signing key to forge an admin token.</p>
<div style="margin-top:1rem;display:flex;gap:0.5rem;justify-content:center;flex-wrap:wrap;">
<span class="badge" style="background:rgba(255,215,0,0.2);color:var(--accent-yellow);border:1px solid rgba(255,215,0,0.4);">Medium</span>
<span class="badge badge-points">105 points</span></div></div></div>
<div class="container">
<div id="flagSection" class="card" style="display:none;">
  <h3>Admin Access Granted</h3>
  <div class="flag-display" id="flagText"></div>
</div>
</div>
<footer>Cyber Guardians Society CTF &bull; JWT Authentication Bypass</footer>
<script>
function b64uDecode(s) {
  try {
    s = s.replace(/-/g, '+').replace(/_/g, '/');
    while (s.length % 4) s += '=';
    return JSON.parse(atob(s));
  } catch(e) { return null; }
}

function b64uEncode(obj) {
  try {
    return btoa(JSON.stringify(obj)).replace(/=/g, '').replace(/\+/g, '-').replace(/\//g, '_');
  } catch(e) { return ''; }
}

function readTokenFromURL() {
  var params = new URLSearchParams(window.location.search);
  return params.get('token') || '';
}

function setTokenInURL(token) {
  var url = new URL(window.location.href);
  url.searchParams.set('token', token);
  window.history.replaceState({}, '', url.toString());
}

function checkToken() {
  var token = readTokenFromURL();
  if (!token) {
    var now = Math.floor(Date.now() / 1000);
    var header = { alg: 'HS256', typ: 'JWT' };
    var payload = { user: 'guest', role: 'user', iat: now };
    var h = b64uEncode(header);
    var p = b64uEncode(payload);
    var fakeSig = b64uEncode({ dummy: h + '.' + p + '|secret123' });
    token = h + '.' + p + '.' + fakeSig;
    setTokenInURL(token);
  }
  var parts = token.split('.');
  if (parts.length !== 3) return;
  try {
    var payload = b64uDecode(parts[1]);
    if (payload && payload.role === 'admin') {
      document.getElementById('flagSection').style.display = 'block';
      document.getElementById('flagText').textContent = 'CGS{jwt_alg0r1thm_n0ne}';
    }
  } catch(e) {}
}

document.addEventListener('DOMContentLoaded', checkToken);
setInterval(function() {
  var currentToken = readTokenFromURL();
  if (currentToken !== window._lastToken) {
    window._lastToken = currentToken;
    checkToken();
  }
}, 500);
window._lastToken = readTokenFromURL();
</script>
