<script>
function showTab(n){document.querySelectorAll('.tab-content').forEach(t=>t.classList.remove('active'));document.querySelectorAll('nav a').forEach(b=>b.classList.remove('active'));document.getElementById('tab-'+n).classList.add('active');document.querySelector('nav a[onclick*="'+n+'"]')?.classList.add('active')}
function log(m,c){var l=document.getElementById('log');if(!l)return;var e=document.createElement('div');e.className='tx-entry '+(c||'');var t=new Date().toLocaleTimeString();e.textContent='['+t+'] '+m;l.appendChild(e);l.scrollTop=l.scrollHeight}
