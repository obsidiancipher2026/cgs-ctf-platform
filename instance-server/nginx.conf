events {
    worker_connections 1024;
}

http {
    upstream instance_server {
        server instance-server:3100;
    }

    server {
        listen 80;

        location /api/instances/ {
            proxy_pass http://instance_server;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location ~ ^/ctf-([a-z0-9]+)-([a-z0-9]+)-([a-z0-9]+)/ {
            set $challenge_slug $1;
            set $instance_id $3;

            proxy_pass http://instance_server/api/instances/site/$challenge_slug/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }
    }
}
